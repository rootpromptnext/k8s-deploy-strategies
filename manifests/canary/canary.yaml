apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo
      track: canary
  template:
    metadata:
      labels:
        app: echo
        track: canary
    spec:
      containers:
      - name: echo
        image: ealen/echo-server:0.2
        readinessProbe:
          httpGet: { path: "/", port: 80 }
        livenessProbe:
          httpGet: { path: "/", port: 80 }
