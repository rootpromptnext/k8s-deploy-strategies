apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-stable
spec:
  replicas: 3
  selector:
    matchLabels:
      app: echo
      track: stable
  template:
    metadata:
      labels:
        app: echo
        track: stable
    spec:
      containers:
      - name: echo
        image: ealen/echo-server:0.1
        readinessProbe:
          httpGet: { path: "/", port: 80 }
        livenessProbe:
          httpGet: { path: "/", port: 80 }
