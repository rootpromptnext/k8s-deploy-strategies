apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-green
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo
      version: green
  template:
    metadata:
      labels:
        app: echo
        version: green
    spec:
      containers:
      - name: echo
        image: ealen/echo-server:0.2
        readinessProbe:
          httpGet: { path: "/", port: 80 }
        livenessProbe:
          httpGet: { path: "/", port: 80 }
